<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>人格探索局 - Phase 1 MVP 测试演示</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; }
    .container { max-width: 800px; margin: 0 auto; background: white; border-radius: 20px; padding: 40px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
    h1 { color: #333; margin-bottom: 10px; }
    .subtitle { color: #666; margin-bottom: 30px; }
    .progress { background: #f0f0f0; border-radius: 10px; height: 10px; margin-bottom: 30px; overflow: hidden; }
    .progress-bar { background: linear-gradient(90deg, #667eea, #764ba2); height: 100%; width: 0%; transition: width 0.3s; }
    .question { margin-bottom: 30px; }
    .question-text { font-size: 20px; color: #333; margin-bottom: 20px; }
    .options { display: grid; gap: 15px; }
    .option { padding: 20px; border: 2px solid #e0e0e0; border-radius: 10px; cursor: pointer; transition: all 0.3s; }
    .option:hover { border-color: #667eea; background: #f8f9ff; }
    .option.selected { border-color: #667eea; background: #667eea; color: white; }
    .btn { background: linear-gradient(90deg, #667eea, #764ba2); color: white; border: none; padding: 15px 40px; border-radius: 10px; font-size: 18px; cursor: pointer; width: 100%; margin-top: 30px; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .result { text-align: center; }
    .mbti-type { font-size: 72px; font-weight: bold; color: #667eea; margin: 20px 0; }
    .type-name { font-size: 24px; color: #666; margin-bottom: 30px; }
    .dimensions { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; margin-top: 30px; }
    .dimension { background: #f8f9ff; padding: 20px; border-radius: 10px; }
    .dimension-label { font-size: 14px; color: #666; margin-bottom: 10px; }
    .dimension-bar { background: #e0e0e0; border-radius: 5px; height: 10px; overflow: hidden; }
    .dimension-fill { background: linear-gradient(90deg, #667eea, #764ba2); height: 100%; width: 0%; transition: width 0.5s; }
    .stability { margin-top: 30px; padding: 20px; background: #fff3cd; border-radius: 10px; }
    .paywall { margin-top: 30px; padding: 30px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); border-radius: 20px; color: white; text-align: center; }
    .price { font-size: 48px; font-weight: bold; margin: 20px 0; }
    .features { text-align: left; margin: 20px 0; }
    .feature { padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.2); }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="container">
    <div id="intro">
      <h1>🧠 人格探索局</h1>
      <p class="subtitle">Phase 1 MVP 测试演示 - 发现真实的自己</p>
      <div style="background: #f8f9ff; padding: 20px; border-radius: 10px; margin: 30px 0;">
        <h3>📋 测试说明</h3>
        <ul style="margin: 15px 0 0 20px; line-height: 2;">
          <li>共 4 道测试题，预计 2 分钟完成</li>
          <li>基于 MBTI 理论，测量 E/I、N/S、T/F、J/P 四个维度</li>
          <li>完成后获得你的人格类型和深度解读</li>
        </ul>
      </div>
      <button class="btn" onclick="startTest()">开始测试</button>
    </div>

    <div id="test" class="hidden">
      <div class="progress"><div class="progress-bar" id="progressBar"></div></div>
      <div class="question">
        <div class="question-text" id="questionText"></div>
        <div class="options" id="options"></div>
      </div>
      <button class="btn" id="nextBtn" onclick="nextQuestion()" disabled>下一题</button>
    </div>

    <div id="result" class="hidden">
      <h1>🎉 测试完成！</h1>
      <div class="result">
        <div class="mbti-type" id="mbtiType">INFJ</div>
        <div class="type-name" id="typeName">提倡者</div>
        
        <div class="stability">
          <strong>稳定性指数：</strong> 75% <br>
          <small>下次重测类型一致概率：82%</small>
        </div>

        <div class="dimensions" id="dimensions"></div>

        <div class="paywall">
          <h2>🔓 解锁完整人格报告</h2>
          <div class="price">¥29</div>
          <div class="features">
            <div class="feature">✅ 16 页深度人格解读</div>
            <div class="feature">✅ 优势与盲点分析</div>
            <div class="feature">✅ 职业发展指引</div>
            <div class="feature">✅ 人际关系图谱</div>
            <div class="feature">✅ 个人成长计划</div>
          </div>
          <button class="btn" style="background: white; color: #667eea;" onclick="alert('演示版本 - 支付功能暂未接入')">立即解锁</button>
          <p style="margin-top: 15px; font-size: 14px; opacity: 0.8;">7 天无理由退款</p>
        </div>
      </div>
    </div>
  </div>

  <script>
    const questions = [
      { id: 1, text: "在社交场合中，你通常会？", dimension: "E", options: [
        { id: 1, text: "主动和陌生人交谈", score: 100 },
        { id: 2, text: "等待别人先说话", score: 0 },
        { id: 3, text: "看情况而定", score: 50 },
        { id: 4, text: "不太确定", score: 50 }
      ]},
      { id: 2, text: "你更喜欢？", dimension: "N", options: [
        { id: 1, text: "关注未来的可能性", score: 100 },
        { id: 2, text: "关注当下的现实", score: 0 },
        { id: 3, text: "两者兼顾", score: 50 },
        { id: 4, text: "不确定", score: 50 }
      ]},
      { id: 3, text: "做决定时，你更看重？", dimension: "T", options: [
        { id: 1, text: "逻辑和理性", score: 100 },
        { id: 2, text: "情感和他人感受", score: 0 },
        { id: 3, text: "两者平衡", score: 50 },
        { id: 4, text: "不确定", score: 50 }
      ]},
      { id: 4, text: "你的生活方式更倾向于？", dimension: "J", options: [
        { id: 1, text: "有计划有条理", score: 100 },
        { id: 2, text: "灵活随性", score: 0 },
        { id: 3, text: "介于两者之间", score: 50 },
        { id: 4, text: "不确定", score: 50 }
      ]}
    ];

    const typeNames = {
      'INFJ': '提倡者', 'INFP': '调停者', 'ENFJ': '主人公', 'ENFP': '竞选者',
      'INTJ': '建筑师', 'INTP': '逻辑学家', 'ENTJ': '指挥官', 'ENTP': '辩论家',
      'ISTJ': '物流师', 'ISFJ': '守卫者', 'ESTJ': '总经理', 'ESFJ': '执政官',
      'ISTP': '鉴赏家', 'ISFP': '探险家', 'ESTP': '企业家', 'ESFP': '表演者'
    };

    let currentQuestion = 0;
    let answers = [];
    let scores = { E: 50, N: 50, T: 50, J: 50 };

    function startTest() {
      document.getElementById('intro').classList.add('hidden');
      document.getElementById('test').classList.remove('hidden');
      showQuestion();
    }

    function showQuestion() {
      const q = questions[currentQuestion];
      document.getElementById('questionText').textContent = q.text;
      document.getElementById('progressBar').style.width = `${(currentQuestion / questions.length) * 100}%`;
      
      const optionsHtml = q.options.map(opt => 
        `<div class="option" onclick="selectOption(${opt.id})">${opt.text}</div>`
      ).join('');
      document.getElementById('options').innerHTML = optionsHtml;
      document.getElementById('nextBtn').disabled = true;
    }

    function selectOption(optionId) {
      document.querySelectorAll('.option').forEach(el => el.classList.remove('selected'));
      event.target.classList.add('selected');
      answers[currentQuestion] = { questionId: questions[currentQuestion].id, optionId };
      document.getElementById('nextBtn').disabled = false;
    }

    function nextQuestion() {
      const q = questions[currentQuestion];
      const ans = answers[currentQuestion];
      const option = q.options.find(o => o.id === ans.optionId);
      if (option) scores[q.dimension] = option.score;

      currentQuestion++;
      if (currentQuestion >= questions.length) {
        showResult();
      } else {
        showQuestion();
      }
    }

    function showResult() {
      document.getElementById('test').classList.add('hidden');
      document.getElementById('result').classList.remove('hidden');

      const type = 
        (scores.E >= 50 ? 'E' : 'I') +
        (scores.N >= 50 ? 'N' : 'S') +
        (scores.T >= 50 ? 'T' : 'F') +
        (scores.J >= 50 ? 'J' : 'P');

      document.getElementById('mbtiType').textContent = type;
      document.getElementById('typeName').textContent = typeNames[type] || '探索者';

      const dims = [
        { label: '外向 (E) - 内向 (I)', score: scores.E },
        { label: '直觉 (N) - 实感 (S)', score: scores.N },
        { label: '思维 (T) - 情感 (F)', score: scores.T },
        { label: '判断 (J) - 知觉 (P)', score: scores.J }
      ];

      document.getElementById('dimensions').innerHTML = dims.map(d => `
        <div class="dimension">
          <div class="dimension-label">${d.label}</div>
          <div class="dimension-bar"><div class="dimension-fill" style="width: ${d.score}%"></div></div>
        </div>
      `).join('');
    }
  </script>
</body>
</html>
